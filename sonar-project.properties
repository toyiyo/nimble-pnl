# SonarQube Configuration for nimble-pnl

# Project identification
sonar.projectKey=toyiyo_nimble-pnl
sonar.organization=toyiyo

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx,src/integrations/supabase/types.ts,src/pages/**/*.tsx

# Code duplication exclusions
# E2E tests often have repetitive setup/teardown code which is acceptable
# Generated types file may have duplicates from database schema
sonar.cpd.exclusions=tests/e2e/**/*.spec.ts,tests/**/*.test.ts,tests/**/*.test.tsx,src/integrations/supabase/types.ts,src/pages/**/*.tsx

# Coverage exclusions
# Must stay aligned with vitest.config.ts `coverage.exclude`. Pure route-wiring
# and barrel re-export files have no testable behavior on their own and are
# covered end-to-end by Playwright, not unit tests.
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/tests/**,\
  src/components/**/*.tsx,\
  src/components/**/index.ts,\
  src/pages/**/*.tsx,\
  src/contexts/**/*.tsx,\
  src/hooks/use*.tsx,\
  src/integrations/**,\
  src/types/**,\
  src/App.tsx,\
  src/main.tsx,\
  src/vite-env.d.ts

# Language-specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Code quality settings
sonar.sourceEncoding=UTF-8
